services:
  postgres:
    image: postgres:16
    container_name: corestack-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corestack}
      POSTGRES_DB: ${POSTGRES_DB:-corestack}
    volumes:
      - corestack_postgres_data:/var/lib/postgresql/data

volumes:
  corestack_postgres_data:
